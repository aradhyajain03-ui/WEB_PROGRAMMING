<!DOCTYPE html>
<html>
<head>
<title>Login Window</title>

<style>

body{
margin:0;
font-family: Arial, sans-serif;
background-color:#c7d4e2;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:white;
padding:30px;
border-radius:8px;
box-shadow:0px 0px 10px rgba(0,0,0,0.2);
width:300px;
text-align:center;
}

.login-box h2{
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background-color:#1976d2;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background-color:#0d47a1;
}

.student-info{
margin-top:20px;
font-weight:bold;
text-align:center;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Login</h2>

<input type="text" placeholder="Username">

<input type="password" placeholder="Password">

<button>Login</button>

</div>

<div class="student-info">
<p>Name: Aradhya Saraf Jain</p>
<p>Register Number: 24BCT0018</p>
</div>

</body>
</html>
