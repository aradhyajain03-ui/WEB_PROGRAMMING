<!DOCTYPE html>
<html>
<head>
<title>Student Registration Portal</title>

<style>

body{
background-color:skyblue;
font-family:Arial;
margin:0;
padding:0;
text-align:center;
}

h1{
margin-top:20px;
}

nav{
margin:20px;
}

nav a{
background-color:darkblue;
color:white;
padding:10px 15px;
text-decoration:none;
margin:5px;
border-radius:6px;
display:inline-block;
}

nav a:hover{
background-color:#000080;
}

form{
width:60%;
margin:auto;
}

.section{
background-color:darkblue;
color:white;
padding:20px;
margin:20px 0;
border-radius:8px;
text-align:left;
}

.section h2{
text-align:center;
}

label{
display:block;
margin-top:10px;
}

input, select{
width:100%;
padding:8px;
margin-top:5px;
border-radius:4px;
border:none;
}

.submit-box{
margin:20px 0;
text-align:center;
}

button{
padding:12px 30px;
background-color:darkblue;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background-color:#000080;
}

</style>

<script>
function showMessage(){
alert("Form Submitted Successfully");
}
</script>

</head>

<body>

<h1>Student Registration Portal</h1>

<nav>
<a href="#personal">Personal Information</a>
<a href="#academic">Academic Details</a>
<a href="#address">Address Information</a>
<a href="#account">Account Credentials</a>
</nav>

<form onsubmit="showMessage()">
<div class="section" id="personal">
<h2>Personal Information</h2>

<label>Full Name</label>
<input type="text">

<label>Date of Birth</label>
<input type="date">

<label>Gender</label>
<select>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

<label>Email Address</label>
<input type="email">

<label>Mobile Number</label>
<input type="text">
</div>

<div class="section" id="academic">
<h2>Academic Details</h2>

<label>Register Number</label>
<input type="text">

<label>Degree Program</label>
<input type="text">

<label>Department</label>
<input type="text">

<label>Year of Study</label>
<input type="text">
</div>

<div class="section" id="address">
<h2>Address Information</h2>

<label>Door Number</label>
<input type="text">

<label>Street Name</label>
<input type="text">

<label>City</label>
<input type="text">

<label>State</label>
<input type="text">

<label>Pincode</label>
<input type="text">
</div>

<div class="section" id="account">
<h2>Account Credentials</h2>

<label>Username</label>
<input type="text">

<label>Password</label>
<input type="password">

<label>Confirm Password</label>
<input type="password">

</div>

<div class="submit-box">
<button type="submit">Submit</button>
</div>

</form>
<p><b>Name:</b>Aradhya Saraf Jain</p>
<p><b>Register Number:</b>24BCT0018</p>
</body>
</html>
